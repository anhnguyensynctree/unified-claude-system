  <line x1="726" y1="320" x2="816" y2="320" stroke="#1f3a5e" stroke-width="1" opacity="0.4"/>
  <!-- Chest core — rules engine -->
  <rect x="728" y="258" width="86" height="58" rx="7" fill="#0a1628" stroke="#388bfd" stroke-width="1.5" filter="url(#glow-sm)"/>
  <rect x="736" y="266" width="70" height="42" rx="5" fill="#06111f"/>
  <!-- Animated core dots (3×2) -->
