<svg width="1200" height="540" viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Fira Mono', monospace">
  <defs>
    <!-- Animations -->
    <style>
      .blink  { animation: blink  5s ease-in-out infinite; }
      .blink2 { animation: blink  5s ease-in-out 2.5s infinite; }
      .pulse  { animation: pulse  2.5s ease-in-out infinite; }
      .spark1 { animation: spark  1.8s ease-in-out infinite; }
      .spark2 { animation: spark  1.8s ease-in-out 0.6s infinite; }
      .spark3 { animation: spark  1.8s ease-in-out 1.2s infinite; }
      .dot1   { animation: dotseq 2s ease-in-out 0s   infinite; }
      .dot2   { animation: dotseq 2s ease-in-out 0.3s infinite; }
      .dot3   { animation: dotseq 2s ease-in-out 0.6s infinite; }
      .dot4   { animation: dotseq 2s ease-in-out 0.9s infinite; }
      .arrow-glow { animation: arrowpulse 2s ease-in-out infinite; }
      @keyframes blink   { 0%,86%,100%{opacity:1} 90%{opacity:0} }
      @keyframes pulse   { 0%,100%{opacity:0.8}   50%{opacity:1} }
      @keyframes spark   { 0%,100%{opacity:0.75}  45%{opacity:0.1} }
      @keyframes dotseq  { 0%,100%{opacity:0.45}  50%{opacity:1} }
      @keyframes arrowpulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
    </style>

    <!-- Filters -->
    <filter id="glow-lg"   x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9"   result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md"   x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm"   x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gradients -->
    <radialGradient id="brain-g" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0.95"/>
      <stop offset="55%"  stop-color="#1a4a8a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#06111f" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="halo-g" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a4a8a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="eye-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#388bfd"/>
      <stop offset="100%" stop-color="#0d2a56"/>
    </linearGradient>

    <!-- Dot grid -->
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.55" fill="#21262d"/>
    </pattern>

    <!-- Arrowhead -->
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0.5 L0,8.5 L8,4.5 z" fill="#388bfd"/>
    </marker>
    <marker id="arr-dim" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L5,2.5 z" fill="#1f3a5e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="540" fill="#0d1117" rx="14"/>
  <rect width="1200" height="540" fill="url(#dots)" rx="14" opacity="0.75"/>
  <rect width="1200" height="540" fill="none" stroke="#21262d" stroke-width="1" rx="14"/>

  <!-- Header -->
  <text x="600" y="44" font-size="26" fill="#e6edf3" text-anchor="middle" font-weight="bold" letter-spacing="-0.5">unified-claude-system</text>
  <text x="600" y="68" font-size="13" fill="#8b949e" text-anchor="middle">Claude Code, but upgraded</text>
  <line x1="80" y1="84" x2="1120" y2="84" stroke="#21262d" stroke-width="1"/>


  <!-- ══════════════════════════════════════ -->
