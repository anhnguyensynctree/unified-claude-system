<svg width="1200" height="380" viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Fira Mono', monospace">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388bfd"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#388bfd"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" fill="url(#bg)" rx="12"/>
  <rect width="1200" height="380" fill="none" stroke="#21262d" stroke-width="1" rx="12"/>

  <!-- Header -->
  <text x="600" y="48" font-size="26" fill="#e6edf3" text-anchor="middle" font-weight="bold" letter-spacing="-0.5">unified-claude-system</text>
  <text x="600" y="76" font-size="13" fill="#8b949e" text-anchor="middle">Claude Code · persistent memory · enforced conventions · automated quality gates</text>
  <line x1="60" y1="96" x2="1140" y2="96" stroke="#21262d" stroke-width="1"/>

  <!-- ── LEFT: Without ── -->
  <text x="178" y="122" font-size="10" fill="#f85149" text-anchor="middle" font-weight="bold" letter-spacing="1.5">WITHOUT</text>
  <rect x="60" y="134" width="236" height="192" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="178" y="158" font-size="12" fill="#8b949e" text-anchor="middle">every session</text>
  <line x1="78" y1="166" x2="278" y2="166" stroke="#21262d" stroke-width="1"/>
  <text x="80" y="190" font-size="12" fill="#f85149">✗  starts cold</text>
  <text x="80" y="214" font-size="12" fill="#f85149">✗  re-explain stack</text>
  <text x="80" y="238" font-size="12" fill="#f85149">✗  re-explain conventions</text>
  <text x="80" y="262" font-size="12" fill="#f85149">✗  re-explain preferences</text>
  <text x="80" y="286" font-size="12" fill="#f85149">✗  nothing persists</text>
  <text x="80" y="310" font-size="12" fill="#8b949e">↻  repeat on every session</text>

  <!-- ── CENTRE: Memory Layer ── -->
  <text x="600" y="122" font-size="10" fill="#388bfd" text-anchor="middle" font-weight="bold" letter-spacing="1.5">MEMORY LAYER</text>
  <rect x="400" y="134" width="400" height="192" rx="10" fill="#0d1117" stroke="#388bfd" stroke-width="1.5"/>
  <text x="600" y="158" font-size="12" fill="#388bfd" text-anchor="middle" font-weight="bold">~/.claude/</text>
  <line x1="418" y1="166" x2="782" y2="166" stroke="#1f3a5e" stroke-width="1"/>

  <text x="430" y="190" font-size="12" fill="#e6edf3">MEMORY.md</text>
  <text x="680" y="190" font-size="11" fill="#8b949e">index, always loaded</text>

  <text x="430" y="214" font-size="12" fill="#e6edf3">topics/</text>
  <text x="680" y="214" font-size="11" fill="#8b949e">loaded on demand</text>

  <text x="430" y="238" font-size="12" fill="#e6edf3">facts.json</text>
  <text x="680" y="238" font-size="11" fill="#8b949e">mem0 extraction</text>

  <text x="430" y="262" font-size="12" fill="#e6edf3">hooks/</text>
  <text x="680" y="262" font-size="11" fill="#8b949e">quality gates, auto-format</text>

  <text x="430" y="286" font-size="12" fill="#e6edf3">rules/</text>
  <text x="680" y="286" font-size="11" fill="#8b949e">enforced conventions</text>

  <text x="430" y="310" font-size="12" fill="#e6edf3">commands/</text>
  <text x="680" y="310" font-size="11" fill="#8b949e">tdd · commit · plan · review</text>

  <!-- ── RIGHT: With system ── -->
  <text x="1022" y="122" font-size="10" fill="#3fb950" text-anchor="middle" font-weight="bold" letter-spacing="1.5">WITH THIS SYSTEM</text>
  <rect x="904" y="134" width="236" height="192" rx="8" fill="#161b22" stroke="#238636" stroke-width="1"/>
  <text x="1022" y="158" font-size="12" fill="#8b949e" text-anchor="middle">every session</text>
  <line x1="922" y1="166" x2="1122" y2="166" stroke="#21262d" stroke-width="1"/>
  <text x="924" y="190" font-size="12" fill="#3fb950">✓  starts warm</text>
  <text x="924" y="214" font-size="12" fill="#3fb950">✓  knows your codebase</text>
  <text x="924" y="238" font-size="12" fill="#3fb950">✓  enforces conventions</text>
  <text x="924" y="262" font-size="12" fill="#3fb950">✓  remembers yesterday</text>
  <text x="924" y="286" font-size="12" fill="#3fb950">✓  patterns accumulate</text>
  <text x="924" y="310" font-size="12" fill="#3fb950">✓  gets smarter over time</text>

  <!-- Arrows left ↔ centre -->
  <line x1="298" y1="216" x2="396" y2="216" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="347" y="210" font-size="10" fill="#388bfd" text-anchor="middle">persists</text>

  <line x1="398" y1="246" x2="300" y2="246" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr-l)"/>
  <text x="347" y="262" font-size="10" fill="#388bfd" text-anchor="middle">loads</text>

  <!-- Arrows centre ↔ right -->
  <line x1="802" y1="216" x2="900" y2="216" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="851" y="210" font-size="10" fill="#388bfd" text-anchor="middle">loads</text>

  <line x1="902" y1="246" x2="804" y2="246" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr-l)"/>
  <text x="851" y="262" font-size="10" fill="#388bfd" text-anchor="middle">persists</text>

  <!-- Footer -->
  <line x1="60" y1="344" x2="1140" y2="344" stroke="#21262d" stroke-width="1"/>
  <text x="600" y="366" font-size="11" fill="#3d444d" text-anchor="middle">github.com/anhnguyensynctree/unified-claude-system</text>
</svg>
