  <rect x="738" y="143" width="66" height="5" rx="2.5" fill="#0d2040" stroke="#1f3a5e" stroke-width="0.5"/>

  <!-- LED Eyebrows -->
  <rect x="741" y="152" width="20" height="3.5" rx="1.5" fill="#388bfd" filter="url(#glow-sm)" class="pulse"/>
  <rect x="781" y="152" width="20" height="3.5" rx="1.5" fill="#388bfd" filter="url(#glow-sm)" class="pulse"/>

  <!-- Eyes — glowing multi-ring -->
  <!-- Left eye -->
  <circle cx="751" cy="163" r="10"  fill="#050f20" stroke="#388bfd" stroke-width="1.5"/>
  <circle cx="751" cy="163" r="7"   fill="url(#eye-g)" class="blink"/>
  <circle cx="751" cy="163" r="3.5" fill="#388bfd" filter="url(#glow-sm)" class="blink"/>
  <circle cx="749" cy="161" r="1.5" fill="#d0e8ff" class="blink"/>
  <!-- Right eye -->
  <circle cx="791" cy="163" r="10"  fill="#050f20" stroke="#388bfd" stroke-width="1.5"/>
  <circle cx="791" cy="163" r="7"   fill="url(#eye-g)" class="blink2"/>
  <circle cx="791" cy="163" r="3.5" fill="#388bfd" filter="url(#glow-sm)" class="blink2"/>
  <circle cx="789" cy="161" r="1.5" fill="#d0e8ff" class="blink2"/>

  <!-- ★ BRAIN — memory layer ★ -->
  <ellipse cx="771" cy="182" rx="28" ry="24" fill="url(#brain-g)" filter="url(#glow-lg)" class="pulse"/>
  <line x1="771" y1="160" x2="771" y2="204" stroke="#a0c8ff" stroke-width="0.9" opacity="0.45"/>
  <path d="M 756,172 Q 763,179 756,186" fill="none" stroke="#a0c8ff" stroke-width="0.9" opacity="0.45"/>
  <path d="M 786,172 Q 779,179 786,186" fill="none" stroke="#a0c8ff" stroke-width="0.9" opacity="0.45"/>
  <path d="M 762,162 Q 752,172 758,182" fill="none" stroke="#a0c8ff" stroke-width="0.7" opacity="0.35"/>
  <path d="M 780,162 Q 790,172 784,182" fill="none" stroke="#a0c8ff" stroke-width="0.7" opacity="0.35"/>

  <!-- Smile -->
  <path d="M 758,207 Q 771,215 784,207" fill="none" stroke="#388bfd" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <!-- Chin vent -->
  <rect x="763" y="212" width="16" height="4" rx="2" fill="#0a1628" stroke="#1f3a5e" stroke-width="0.5"/>

  <!-- Neck -->
  <rect x="761" y="220" width="20" height="20" rx="4" fill="#0a1628" stroke="#388bfd" stroke-width="1"/>
  <!-- Neck circuit -->
