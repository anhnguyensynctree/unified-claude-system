  <circle cx="763" cy="277" r="3" fill="#388bfd" class="dot2"/>
  <circle cx="775" cy="277" r="3" fill="#388bfd" class="dot3"/>
  <circle cx="787" cy="277" r="3" fill="#388bfd" class="dot4"/>
