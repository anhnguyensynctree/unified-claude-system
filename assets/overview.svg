  <!-- ══════════════════════════════════════ -->

  <!-- Labels -->
  <text x="195" y="102" font-size="16" fill="#4a5160" text-anchor="middle" font-weight="bold" letter-spacing="1">MARK I</text>
  <text x="195" y="117" font-size="9"  fill="#3d444d" text-anchor="middle" letter-spacing="2">BEFORE</text>

  <!-- Antenna -->
  <line x1="195" y1="148" x2="195" y2="133" stroke="#30363d" stroke-width="2"/>
  <circle cx="195" cy="130" r="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <circle cx="195" cy="130" r="2" fill="#30363d"/>

  <!-- Head -->
  <rect x="167" y="146" width="56" height="54" rx="10" fill="#111820" stroke="#30363d" stroke-width="1.5"/>
  <!-- Forehead panel -->
  <rect x="174" y="150" width="42" height="8"  rx="3" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <!-- Corner bolts -->
  <circle cx="174" cy="158" r="2" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="216" cy="158" r="2" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>

  <!-- Eyes — dull, dead -->
  <circle cx="183" cy="170" r="7"   fill="#0d1117" stroke="#2a3340" stroke-width="1.5"/>
  <circle cx="183" cy="170" r="4"   fill="#131920"/>
  <circle cx="183" cy="170" r="1.5" fill="#21262d"/>
  <circle cx="207" cy="170" r="7"   fill="#0d1117" stroke="#2a3340" stroke-width="1.5"/>
  <circle cx="207" cy="170" r="4"   fill="#131920"/>
  <circle cx="207" cy="170" r="1.5" fill="#21262d"/>

  <!-- Mouth — flat frown -->
  <path d="M 182,186 Q 195,183 208,186" fill="none" stroke="#2a3340" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chin panel -->
