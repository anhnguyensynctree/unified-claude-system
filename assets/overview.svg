  <!--  RIGHT ROBOT  —  MARK L  (upgraded)   -->
  <!-- ══════════════════════════════════════ -->

  <!-- Atmospheric halo -->
  <ellipse cx="771" cy="325" rx="155" ry="195" fill="url(#halo-g)"/>

  <!-- Labels -->
  <text x="771" y="102" font-size="16" fill="#388bfd" text-anchor="middle" font-weight="bold" letter-spacing="1" filter="url(#glow-sm)">MARK L</text>
  <text x="771" y="117" font-size="9"  fill="#3fb950" text-anchor="middle" letter-spacing="2">AFTER</text>

  <!-- Antenna with animated sparks -->
  <line x1="771" y1="142" x2="771" y2="125" stroke="#388bfd" stroke-width="2.5"/>
  <circle cx="771" cy="122" r="6" fill="#388bfd" class="pulse" filter="url(#glow-md)"/>
  <circle cx="771" cy="122" r="3" fill="#e6edf3"/>
  <line x1="761" y1="117" x2="756" y2="111" stroke="#388bfd" stroke-width="1.5" class="spark1"/>
  <line x1="781" y1="117" x2="786" y2="111" stroke="#388bfd" stroke-width="1.5" class="spark2"/>
  <line x1="771" y1="116" x2="771" y2="109" stroke="#388bfd" stroke-width="1.5" class="spark3"/>

  <!-- Head -->
  <rect x="730" y="140" width="82" height="80" rx="13" fill="#080f1c" stroke="#388bfd" stroke-width="2"/>
