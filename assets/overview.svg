<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Fira Mono', monospace">
  <defs>
    <!-- Filters -->
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Backgrounds -->
    <radialGradient id="centre-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a4a7a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mem-box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080f1c"/>
      <stop offset="100%" stop-color="#040a12"/>
    </linearGradient>
    <linearGradient id="cold-card" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#120a0a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="warm-card" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#080f08"/>
    </linearGradient>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#21262d"/>
    </pattern>

    <!-- Arrow markers -->
    <marker id="arr-blue" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L6.5,3.5 z" fill="#388bfd"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#0d1117" rx="14"/>
  <rect width="1200" height="500" fill="url(#dots)" rx="14" opacity="0.7"/>
  <rect width="1200" height="500" fill="none" stroke="#21262d" stroke-width="1" rx="14"/>

  <!-- Centre atmospheric halo -->
  <ellipse cx="600" cy="290" rx="320" ry="220" fill="url(#centre-halo)"/>

  <!-- === HEADER === -->
  <text x="600" y="46" font-size="28" fill="#e6edf3" text-anchor="middle" font-weight="bold" letter-spacing="-0.5">unified-claude-system</text>
  <text x="600" y="72" font-size="13" fill="#8b949e" text-anchor="middle">Claude Code, with persistent memory</text>
  <line x1="80" y1="90" x2="1120" y2="90" stroke="#21262d" stroke-width="1"/>

  <!-- === LEFT — WITHOUT === -->
  <text x="160" y="114" font-size="9" fill="#f85149" text-anchor="middle" font-weight="bold" letter-spacing="2.5">WITHOUT</text>

  <!-- Cold card 1 -->
  <rect x="30" y="124" width="258" height="76" rx="7" fill="url(#cold-card)" stroke="#3d1a1a" stroke-width="1"/>
  <text x="50" y="146" font-size="11" fill="#6e7681">Session  1</text>
  <circle cx="252" cy="142" r="4" fill="#f85149" opacity="0.8"/>
  <text x="260" y="146" font-size="10" fill="#f85149">cold</text>
  <line x1="30" y1="154" x2="288" y2="154" stroke="#1e1212" stroke-width="1"/>
  <text x="50" y="172" font-size="11" fill="#6e7681">✗  starts blank</text>
  <text x="50" y="190" font-size="11" fill="#6e7681">✗  re-explain everything</text>

  <!-- Disconnect indicator -->
  <text x="160" y="214" font-size="10" fill="#2a1a1a" text-anchor="middle">╌╌╌╌╌╌╌╌╌ no memory ╌╌╌╌╌╌╌╌╌</text>

  <!-- Cold card 2 -->
  <rect x="30" y="222" width="258" height="76" rx="7" fill="url(#cold-card)" stroke="#3d1a1a" stroke-width="1"/>
  <text x="50" y="244" font-size="11" fill="#6e7681">Session  2</text>
  <circle cx="252" cy="240" r="4" fill="#f85149" opacity="0.8"/>
  <text x="260" y="244" font-size="10" fill="#f85149">cold</text>
  <line x1="30" y1="252" x2="288" y2="252" stroke="#1e1212" stroke-width="1"/>
  <text x="50" y="270" font-size="11" fill="#6e7681">✗  starts blank again</text>
  <text x="50" y="288" font-size="11" fill="#6e7681">✗  nothing was saved</text>

  <!-- Disconnect indicator -->
  <text x="160" y="312" font-size="10" fill="#2a1a1a" text-anchor="middle">╌╌╌╌╌╌╌╌╌ no memory ╌╌╌╌╌╌╌╌╌</text>

  <!-- Cold card 3 -->
  <rect x="30" y="320" width="258" height="76" rx="7" fill="url(#cold-card)" stroke="#3d1a1a" stroke-width="1"/>
  <text x="50" y="342" font-size="11" fill="#6e7681">Session  3</text>
  <circle cx="252" cy="338" r="4" fill="#f85149" opacity="0.8"/>
  <text x="260" y="342" font-size="10" fill="#f85149">cold</text>
  <line x1="30" y1="350" x2="288" y2="350" stroke="#1e1212" stroke-width="1"/>
  <text x="50" y="368" font-size="11" fill="#6e7681">✗  same as session 1</text>
  <text x="50" y="386" font-size="11" fill="#6e7681">✗  pattern never breaks</text>

  <text x="160" y="424" font-size="11" fill="#4a2020" text-anchor="middle" font-style="italic">↻  repeats forever</text>

  <!-- === CENTRE — MEMORY LAYER === -->
  <!-- Outer glow ring -->
  <rect x="300" y="100" width="600" height="372" rx="12" fill="none" stroke="#388bfd" stroke-width="10" opacity="0.07" filter="url(#glow-blue)"/>
  <!-- Main box -->
  <rect x="308" y="106" width="584" height="360" rx="10" fill="url(#mem-box)" stroke="#1d3d6b" stroke-width="1.5"/>
  <!-- Top blue accent line -->
  <rect x="308" y="106" width="584" height="3" rx="2" fill="#388bfd" opacity="0.6"/>

  <!-- MEMORY LAYER text — the hero -->
  <text x="600" y="190" font-size="52" fill="#388bfd" text-anchor="middle" font-weight="bold" letter-spacing="-2" filter="url(#glow-text)">MEMORY</text>
  <text x="600" y="246" font-size="52" fill="#388bfd" text-anchor="middle" font-weight="bold" letter-spacing="-2" filter="url(#glow-text)">LAYER</text>

  <!-- Thin divider -->
  <line x1="340" y1="262" x2="860" y2="262" stroke="#1a3050" stroke-width="1"/>

  <!-- Component badges — 2 × 2 -->
  <rect x="336" y="276" width="249" height="38" rx="6" fill="#0a1628" stroke="#1a3a5c" stroke-width="1"/>
  <text x="461" y="300" font-size="12" fill="#4d94d9" text-anchor="middle">MEMORY.md</text>

  <rect x="593" y="276" width="249" height="38" rx="6" fill="#0a1628" stroke="#1a3a5c" stroke-width="1"/>
  <text x="718" y="300" font-size="12" fill="#4d94d9" text-anchor="middle">topics/</text>

  <rect x="336" y="322" width="249" height="38" rx="6" fill="#0a1628" stroke="#1a3a5c" stroke-width="1"/>
  <text x="461" y="346" font-size="12" fill="#4d94d9" text-anchor="middle">facts.json</text>

  <rect x="593" y="322" width="249" height="38" rx="6" fill="#0a1628" stroke="#1a3a5c" stroke-width="1"/>
  <text x="718" y="346" font-size="12" fill="#4d94d9" text-anchor="middle">hooks/ · rules/</text>

  <!-- Bottom tagline -->
  <line x1="340" y1="372" x2="860" y2="372" stroke="#1a3050" stroke-width="1"/>
  <text x="600" y="398" font-size="13" fill="#388bfd" text-anchor="middle" font-style="italic">every session starts warm</text>
  <text x="600" y="420" font-size="11" fill="#2a5a8a" text-anchor="middle">persists across sessions  ·  /consolidate-memory keeps it lean</text>
  <text x="600" y="442" font-size="11" fill="#1f4060" text-anchor="middle">mem0 extracts facts  ·  Haiku · Sonnet · Opus  —  cost-tiered by task</text>

  <!-- === RIGHT — WITH === -->
  <text x="1040" y="114" font-size="9" fill="#3fb950" text-anchor="middle" font-weight="bold" letter-spacing="2.5">WITH THIS SYSTEM</text>

  <!-- Warm card 1 -->
  <rect x="912" y="124" width="258" height="76" rx="7" fill="url(#warm-card)" stroke="#1f4023" stroke-width="1"/>
  <text x="932" y="146" font-size="11" fill="#8b949e">Session  1</text>
  <circle cx="1136" cy="142" r="4" fill="#3fb950" opacity="0.8"/>
  <text x="1144" y="146" font-size="10" fill="#3fb950">warm</text>
  <line x1="912" y1="154" x2="1170" y2="154" stroke="#121e12" stroke-width="1"/>
  <text x="932" y="172" font-size="11" fill="#3fb950">✓  knows your stack</text>
  <text x="932" y="190" font-size="11" fill="#3fb950">✓  conventions enforced</text>

  <!-- Connect indicator -->
  <text x="1040" y="214" font-size="10" fill="#152815" text-anchor="middle">┄┄┄┄┄┄┄┄┄ via memory ┄┄┄┄┄┄┄┄┄</text>

  <!-- Warm card 2 -->
  <rect x="912" y="222" width="258" height="76" rx="7" fill="url(#warm-card)" stroke="#1f4023" stroke-width="1"/>
  <text x="932" y="244" font-size="11" fill="#8b949e">Session  2</text>
  <circle cx="1136" cy="240" r="4" fill="#3fb950" opacity="0.8"/>
  <text x="1144" y="244" font-size="10" fill="#3fb950">richer</text>
  <line x1="912" y1="252" x2="1170" y2="252" stroke="#121e12" stroke-width="1"/>
  <text x="932" y="270" font-size="11" fill="#3fb950">✓  remembers decisions</text>
  <text x="932" y="288" font-size="11" fill="#3fb950">✓  patterns accumulate</text>

  <!-- Connect indicator -->
  <text x="1040" y="312" font-size="10" fill="#152815" text-anchor="middle">┄┄┄┄┄┄┄┄┄ via memory ┄┄┄┄┄┄┄┄┄</text>

  <!-- Warm card 3 -->
  <rect x="912" y="320" width="258" height="76" rx="7" fill="url(#warm-card)" stroke="#1f4023" stroke-width="1"/>
  <text x="932" y="342" font-size="11" fill="#8b949e">Session  3</text>
  <circle cx="1136" cy="338" r="4" fill="#3fb950" opacity="0.8"/>
  <text x="1144" y="342" font-size="10" fill="#3fb950">smarter</text>
  <line x1="912" y1="350" x2="1170" y2="350" stroke="#121e12" stroke-width="1"/>
  <text x="932" y="368" font-size="11" fill="#3fb950">✓  knows your codebase</text>
  <text x="932" y="386" font-size="11" fill="#3fb950">✓  gets smarter over time</text>

  <text x="1040" y="424" font-size="11" fill="#1a4a20" text-anchor="middle" font-style="italic">↑  accumulates every session</text>

  <!-- === FLOW ARROWS === -->
  <!-- Left cards → memory (card vertical centres: 162, 260, 358) -->
  <line x1="290" y1="162" x2="305" y2="162" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="290" y1="260" x2="305" y2="260" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="290" y1="358" x2="305" y2="358" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Memory → right cards -->
  <line x1="895" y1="162" x2="910" y2="162" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="895" y1="260" x2="910" y2="260" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="895" y1="358" x2="910" y2="358" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arr-blue)"/>
</svg>
