  <!-- Neck -->
  <rect x="189" y="200" width="12" height="16" rx="3" fill="#111820" stroke="#30363d" stroke-width="1"/>

  <!-- Body -->
  <rect x="160" y="216" width="70" height="70" rx="8" fill="#111820" stroke="#30363d" stroke-width="1.5"/>
  <!-- Empty chest panel (no power) -->
  <rect x="174" y="228" width="42" height="30" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <line x1="182" y1="238" x2="208" y2="238" stroke="#1a2030" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="182" y1="248" x2="208" y2="248" stroke="#1a2030" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Side vents -->
  <rect x="163" y="268" width="8"  height="12" rx="2" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <rect x="219" y="268" width="8"  height="12" rx="2" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>

  <!-- Arms -->
  <rect x="142" y="218" width="15" height="58" rx="7" fill="#111820" stroke="#30363d" stroke-width="1"/>
  <rect x="233" y="218" width="15" height="58" rx="7" fill="#111820" stroke="#30363d" stroke-width="1"/>
  <!-- Hands -->
  <rect x="140" y="273" width="19" height="12" rx="4" fill="#111820" stroke="#30363d" stroke-width="1"/>
  <rect x="231" y="273" width="19" height="12" rx="4" fill="#111820" stroke="#30363d" stroke-width="1"/>

  <!-- Legs -->
  <rect x="172" y="282" width="24" height="68" rx="6" fill="#111820" stroke="#30363d" stroke-width="1"/>
  <rect x="194" y="282" width="24" height="68" rx="6" fill="#111820" stroke="#30363d" stroke-width="1"/>
  <!-- Knee joints -->
  <rect x="173" y="307" width="22" height="6" rx="2" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <rect x="195" y="307" width="22" height="6" rx="2" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>

  <!-- Feet -->
  <rect x="160" y="346" width="38" height="14" rx="5" fill="#111820" stroke="#30363d" stroke-width="1"/>
  <rect x="192" y="346" width="38" height="14" rx="5" fill="#111820" stroke="#30363d" stroke-width="1"/>

  <!-- Caption -->
  <text x="195" y="378" font-size="11" fill="#4a5160" text-anchor="middle">stateless · forgets everything</text>
  <text x="195" y="394" font-size="10" fill="#2a3340" text-anchor="middle">↻ re-explain every session</text>


  <!-- ══════════════════════════════════════ -->
  <!--  TRANSFORMATION ZONE                  -->
  <!-- ══════════════════════════════════════ -->

  <text x="455" y="230" font-size="11" fill="#8b949e" text-anchor="middle" font-style="italic">equipped with</text>

  <!-- Arrow -->
  <line x1="362" y1="262" x2="534" y2="262" stroke="#388bfd" stroke-width="3" class="arrow-glow" marker-end="url(#arr)"/>
  <rect x="362" y="254" width="172" height="16" rx="3" fill="#0d1117"/>
  <line x1="362" y1="262" x2="534" y2="262" stroke="#388bfd" stroke-width="2.5" class="arrow-glow" marker-end="url(#arr)"/>
  <text x="449" y="258" font-size="11" fill="#388bfd" text-anchor="middle" font-weight="bold">unified-claude-system</text>


