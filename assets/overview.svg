<svg width="1200" height="480" viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Fira Mono', monospace">
  <defs>
    <filter id="mem-glow" x="-5%" y="-10%" width="110%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="mem-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#091320"/>
      <stop offset="100%" stop-color="#050d18"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bg)" rx="12"/>
  <rect width="1200" height="480" fill="none" stroke="#21262d" stroke-width="1" rx="12"/>

  <!-- Header -->
  <text x="600" y="44" font-size="26" fill="#e6edf3" text-anchor="middle" font-weight="bold" letter-spacing="-0.5">unified-claude-system</text>
  <text x="600" y="70" font-size="13" fill="#8b949e" text-anchor="middle">A unified configuration layer for Claude Code CLI — persistent memory · enforced conventions · automated quality gates</text>
  <line x1="60" y1="88" x2="1140" y2="88" stroke="#21262d" stroke-width="1"/>

  <!-- ── LAYER 1: Interface (y=102, h=60) ── -->
  <rect x="60" y="102" width="1080" height="60" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <rect x="60" y="102" width="3" height="60" rx="2" fill="#6e7681"/>
  <!-- Label -->
  <text x="80" y="136" font-size="9" fill="#6e7681" font-weight="bold" letter-spacing="2">INTERFACE</text>
  <line x1="174" y1="108" x2="174" y2="156" stroke="#21262d" stroke-width="1"/>
  <!-- Content -->
  <text x="190" y="122" font-size="11" fill="#e6edf3">Claude Code CLI  ·  Custom Status Line  ·  Keybindings</text>
  <text x="190" y="146" font-size="11" fill="#6e7681">/tdd · /commit · /plan · /fork · /review-pr · /debug · /learn · /standup · /e2e · /scaffold-project · /breakdown</text>

  <!-- ── LAYER 2: Hooks (y=168, h=76) ── -->
  <rect x="60" y="168" width="1080" height="76" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <rect x="60" y="168" width="3" height="76" rx="2" fill="#1f6feb"/>
  <text x="80" y="210" font-size="9" fill="#1f6feb" font-weight="bold" letter-spacing="2">HOOKS</text>
  <line x1="148" y1="174" x2="148" y2="238" stroke="#21262d" stroke-width="1"/>
  <text x="164" y="190" font-size="11" fill="#e6edf3">PreToolUse:   .md file blocker  ·  git push reminder  ·  long-process warning</text>
  <text x="164" y="210" font-size="11" fill="#6e7681">PostToolUse:  prettier auto-format  ·  tsc --noEmit  ·  console.log warn  ·  markdown quality check</text>
  <text x="164" y="230" font-size="11" fill="#6e7681">Stop / Start:  session persist  ·  mem0 fact extraction  ·  continuous learning  ·  warm context inject</text>

  <!-- ── LAYER 3: Rules (y=250, h=76) ── -->
  <rect x="60" y="250" width="1080" height="76" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <rect x="60" y="250" width="3" height="76" rx="2" fill="#388bfd"/>
  <text x="80" y="292" font-size="9" fill="#388bfd" font-weight="bold" letter-spacing="2">RULES</text>
  <line x1="138" y1="256" x2="138" y2="320" stroke="#21262d" stroke-width="1"/>
  <text x="154" y="272" font-size="11" fill="#e6edf3">coding-style · testing · git-workflow · security · performance · patterns · agents</text>
  <text x="154" y="292" font-size="11" fill="#6e7681">Contexts: dev mode (TDD enforced)  ·  review mode (blockers / suggestions)  ·  research mode (no file edits)</text>
  <text x="154" y="312" font-size="11" fill="#6e7681">Model tiers: Haiku → repetitive worker tasks  ·  Sonnet → 90% of coding  ·  Opus → architecture / security-critical</text>

  <!-- ── LAYER 4: Memory — FOUNDATION (y=332, h=122) ── -->
  <!-- Outer glow -->
  <rect x="58" y="330" width="1084" height="126" rx="8" fill="none" stroke="#388bfd" stroke-width="8" opacity="0.1" filter="url(#mem-glow)"/>
  <!-- Box -->
  <rect x="60" y="332" width="1080" height="122" rx="6" fill="url(#mem-fill)" stroke="#388bfd" stroke-width="1.5"/>
  <rect x="60" y="332" width="3" height="122" rx="2" fill="#388bfd"/>

  <!-- Label -->
  <text x="80" y="362" font-size="9" fill="#388bfd" font-weight="bold" letter-spacing="2">★  MEMORY</text>
  <line x1="162" y1="338" x2="162" y2="448" stroke="#1f3a5e" stroke-width="1"/>

  <!-- Content: 2 columns -->
  <!-- Col 1 -->
  <text x="178" y="358" font-size="11" fill="#58a6ff" font-weight="bold">MEMORY.md</text>
  <text x="178" y="376" font-size="11" fill="#6e7681">lean index · always injected at session start · kept under 80 lines</text>

  <text x="178" y="400" font-size="11" fill="#58a6ff" font-weight="bold">facts.json</text>
  <text x="178" y="418" font-size="11" fill="#6e7681">structured facts extracted by mem0 via Haiku · deduplicated</text>

  <!-- Col 2 -->
  <text x="660" y="358" font-size="11" fill="#58a6ff" font-weight="bold">topics/</text>
  <text x="660" y="376" font-size="11" fill="#6e7681">debugging · patterns · projects · hooks · agents · loaded on demand</text>

  <text x="660" y="400" font-size="11" fill="#58a6ff" font-weight="bold">session notes</text>
  <text x="660" y="418" font-size="11" fill="#6e7681">last 7 days · injected at session start · auto-expired</text>

  <!-- Memory tagline -->
  <line x1="178" y1="428" x2="1122" y2="428" stroke="#1f3a5e" stroke-width="1"/>
  <text x="600" y="444" font-size="11" fill="#388bfd" text-anchor="middle" font-style="italic">Persists across every session · Claude starts warm, not cold · /consolidate-memory keeps it lean</text>

  <!-- Right-side layer bracket annotation -->
  <line x1="1154" y1="102" x2="1154" y2="406" stroke="#21262d" stroke-width="1"/>
  <line x1="1148" y1="102" x2="1154" y2="102" stroke="#21262d" stroke-width="1"/>
  <line x1="1148" y1="406" x2="1154" y2="406" stroke="#21262d" stroke-width="1"/>
  <text x="1170" y="218" font-size="10" fill="#3d444d" text-anchor="middle" transform="rotate(90, 1170, 218)">unified system</text>

  <!-- Down arrows between layers (right side) -->
  <text x="1130" y="138" font-size="14" fill="#21262d" text-anchor="middle">↓</text>
  <text x="1130" y="204" font-size="14" fill="#21262d" text-anchor="middle">↓</text>
  <text x="1130" y="286" font-size="14" fill="#21262d" text-anchor="middle">↓</text>
  <text x="1130" y="324" font-size="14" fill="#388bfd" text-anchor="middle">↓</text>
</svg>
