<svg width="1200" height="540" viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Fira Mono', monospace">
  <defs>
    <filter id="glow-blue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-body" x="-10%" y="-5%" width="120%" height="115%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="brain-grad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#388bfd" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#1a3a6e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="robot-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a4a8a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.55" fill="#21262d"/>
    </pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0.5 L0,8.5 L8,4.5 z" fill="#388bfd"/>
    </marker>
    <marker id="arr-label" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L5,2.5 z" fill="#1f3a5e"/>
    </marker>
  </defs>

  <!-- Base -->
  <rect width="1200" height="540" fill="#0d1117" rx="14"/>
  <rect width="1200" height="540" fill="url(#dots)" rx="14" opacity="0.8"/>
  <rect width="1200" height="540" fill="none" stroke="#21262d" stroke-width="1" rx="14"/>

  <!-- Header -->
  <text x="600" y="44" font-size="26" fill="#e6edf3" text-anchor="middle" font-weight="bold" letter-spacing="-0.5">unified-claude-system</text>
  <text x="600" y="68" font-size="13" fill="#8b949e" text-anchor="middle">Claude Code, but upgraded</text>
  <line x1="80" y1="84" x2="1120" y2="84" stroke="#21262d" stroke-width="1"/>


  <!-- ═══════════════════════════════════════════ -->
  <!-- LEFT ROBOT — plain, stateless              -->
  <!-- ═══════════════════════════════════════════ -->

  <text x="195" y="105" font-size="9" fill="#6e7681" text-anchor="middle" font-weight="bold" letter-spacing="2.5">BEFORE</text>

  <!-- Antenna -->
  <line x1="195" y1="118" x2="195" y2="105" stroke="#30363d" stroke-width="2"/>
  <circle cx="195" cy="103" r="4" fill="#30363d"/>

  <!-- Head -->
  <rect x="167" y="116" width="56" height="54" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Eyes — dull -->
  <circle cx="183" cy="143" r="5" fill="#21262d"/>
  <circle cx="207" cy="143" r="5" fill="#21262d"/>
  <!-- Mouth — flat -->
  <line x1="184" y1="159" x2="206" y2="159" stroke="#30363d" stroke-width="1.5"/>

  <!-- Neck -->
  <rect x="189" y="170" width="12" height="16" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Body -->
  <rect x="160" y="186" width="70" height="68" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Empty chest — no core -->
  <rect x="174" y="200" width="42" height="30" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>

  <!-- Arms -->
  <rect x="143" y="188" width="14" height="56" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="233" y="188" width="14" height="56" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Hands -->
  <rect x="141" y="241" width="18" height="12" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="231" y="241" width="18" height="12" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Legs -->
  <rect x="172" y="250" width="24" height="66" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="194" y="250" width="24" height="66" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Feet -->
  <rect x="160" y="312" width="38" height="14" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="192" y="312" width="38" height="14" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Left robot caption -->
  <text x="195" y="346" font-size="11" fill="#6e7681" text-anchor="middle" font-style="italic">stateless · forgets everything</text>
  <text x="195" y="362" font-size="10" fill="#3d444d" text-anchor="middle">↻ re-explain every session</text>


  <!-- ═══════════════════════════════════════════ -->
  <!-- TRANSFORMATION ZONE                        -->
  <!-- ═══════════════════════════════════════════ -->

  <text x="455" y="232" font-size="11" fill="#8b949e" text-anchor="middle" font-style="italic">equipped with</text>

  <!-- Arrow -->
  <line x1="362" y1="262" x2="536" y2="262" stroke="#388bfd" stroke-width="3" marker-end="url(#arr)"/>
  <rect x="362" y="254" width="174" height="16" rx="3" fill="#0d1117"/>
  <line x1="362" y1="262" x2="536" y2="262" stroke="#388bfd" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- System name on arrow -->
  <text x="449" y="258" font-size="11" fill="#388bfd" text-anchor="middle" font-weight="bold">unified-claude-system</text>


  <!-- ═══════════════════════════════════════════ -->
  <!-- RIGHT ROBOT — upgraded, powered, glowing   -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Atmospheric halo behind robot -->
  <ellipse cx="770" cy="295" rx="155" ry="185" fill="url(#robot-halo)"/>

  <text x="770" y="100" font-size="9" fill="#3fb950" text-anchor="middle" font-weight="bold" letter-spacing="2.5">AFTER</text>

  <!-- Antenna with spark -->
  <line x1="770" y1="112" x2="770" y2="95" stroke="#388bfd" stroke-width="2.5"/>
  <circle cx="770" cy="92" r="6" fill="#388bfd" filter="url(#glow-soft)"/>
  <circle cx="770" cy="92" r="3" fill="#e6edf3"/>
  <!-- Spark lines -->
  <line x1="760" y1="87" x2="756" y2="81" stroke="#388bfd" stroke-width="1.5" opacity="0.7"/>
  <line x1="780" y1="87" x2="784" y2="81" stroke="#388bfd" stroke-width="1.5" opacity="0.7"/>
  <line x1="770" y1="86" x2="770" y2="79" stroke="#388bfd" stroke-width="1.5" opacity="0.5"/>

  <!-- Head -->
  <rect x="730" y="110" width="82" height="80" rx="13" fill="#080f1c" stroke="#388bfd" stroke-width="1.5"/>

  <!-- ★ BRAIN — the memory layer ★ -->
  <ellipse cx="771" cy="148" rx="30" ry="26" fill="url(#brain-grad)" filter="url(#glow-blue)"/>
  <!-- Brain fold lines -->
  <line x1="771" y1="125" x2="771" y2="168" stroke="#7ab8ff" stroke-width="0.9" opacity="0.5"/>
  <path d="M 754,137 Q 761,144 754,151" fill="none" stroke="#7ab8ff" stroke-width="0.9" opacity="0.5"/>
  <path d="M 788,137 Q 781,144 788,151" fill="none" stroke="#7ab8ff" stroke-width="0.9" opacity="0.5"/>
  <path d="M 760,127 Q 750,136 756,148" fill="none" stroke="#7ab8ff" stroke-width="0.7" opacity="0.4"/>
  <path d="M 782,127 Q 792,136 786,148" fill="none" stroke="#7ab8ff" stroke-width="0.7" opacity="0.4"/>

  <!-- Eyes — glowing -->
  <circle cx="750" cy="123" r="6" fill="#388bfd" filter="url(#glow-soft)"/>
  <circle cx="792" cy="123" r="6" fill="#388bfd" filter="url(#glow-soft)"/>
  <circle cx="750" cy="123" r="3" fill="#e6edf3"/>
  <circle cx="792" cy="123" r="3" fill="#e6edf3"/>

  <!-- Neck -->
  <rect x="760" y="190" width="22" height="20" rx="4" fill="#0a1628" stroke="#388bfd" stroke-width="1"/>

  <!-- Body -->
  <rect x="706" y="210" width="130" height="106" rx="10" fill="#080f1c" stroke="#388bfd" stroke-width="1.5"/>
  <!-- Circuit lines on body -->
  <line x1="726" y1="228" x2="726" y2="300" stroke="#1f3a5e" stroke-width="1" opacity="0.6"/>
  <line x1="816" y1="228" x2="816" y2="300" stroke="#1f3a5e" stroke-width="1" opacity="0.6"/>
  <line x1="726" y1="248" x2="816" y2="248" stroke="#1f3a5e" stroke-width="1" opacity="0.4"/>
  <line x1="726" y1="290" x2="816" y2="290" stroke="#1f3a5e" stroke-width="1" opacity="0.4"/>
  <!-- Chest core — rules engine -->
  <rect x="730" y="226" width="82" height="58" rx="7" fill="#0a1628" stroke="#388bfd" stroke-width="1" filter="url(#glow-soft)"/>
  <rect x="738" y="234" width="66" height="42" rx="5" fill="#0d2040"/>
  <!-- Core pattern: 3 rows of small dots -->
  <circle cx="752" cy="244" r="2.5" fill="#388bfd" opacity="0.7"/>
  <circle cx="764" cy="244" r="2.5" fill="#388bfd" opacity="0.7"/>
  <circle cx="776" cy="244" r="2.5" fill="#388bfd" opacity="0.7"/>
  <circle cx="788" cy="244" r="2.5" fill="#388bfd" opacity="0.7"/>
  <circle cx="752" cy="256" r="2.5" fill="#58a6ff" opacity="0.5"/>
  <circle cx="764" cy="256" r="2.5" fill="#58a6ff" opacity="0.5"/>
  <circle cx="776" cy="256" r="2.5" fill="#58a6ff" opacity="0.5"/>
  <circle cx="788" cy="256" r="2.5" fill="#58a6ff" opacity="0.5"/>
  <circle cx="752" cy="268" r="2.5" fill="#1f3a5e" opacity="0.8"/>
  <circle cx="764" cy="268" r="2.5" fill="#1f3a5e" opacity="0.8"/>
  <circle cx="776" cy="268" r="2.5" fill="#1f3a5e" opacity="0.8"/>
  <circle cx="788" cy="268" r="2.5" fill="#1f3a5e" opacity="0.8"/>

  <!-- Arms -->
  <rect x="674" y="210" width="28" height="96" rx="9" fill="#0a1628" stroke="#1f6feb" stroke-width="1.5"/>
  <rect x="840" y="210" width="28" height="96" rx="9" fill="#0a1628" stroke="#1f6feb" stroke-width="1.5"/>
  <!-- Arm circuit accents -->
  <line x1="683" y1="234" x2="693" y2="234" stroke="#388bfd" stroke-width="1" opacity="0.5"/>
  <line x1="683" y1="246" x2="693" y2="246" stroke="#388bfd" stroke-width="1" opacity="0.5"/>
  <line x1="849" y1="234" x2="859" y2="234" stroke="#388bfd" stroke-width="1" opacity="0.5"/>
  <line x1="849" y1="246" x2="859" y2="246" stroke="#388bfd" stroke-width="1" opacity="0.5"/>
  <!-- Hands -->
  <rect x="669" y="302" width="38" height="16" rx="6" fill="#0a1628" stroke="#1f6feb" stroke-width="1"/>
  <rect x="835" y="302" width="38" height="16" rx="6" fill="#0a1628" stroke="#1f6feb" stroke-width="1"/>

  <!-- Legs -->
  <rect x="718" y="312" width="36" height="94" rx="7" fill="#0a1628" stroke="#388bfd" stroke-width="1.5"/>
  <rect x="788" y="312" width="36" height="94" rx="7" fill="#0a1628" stroke="#388bfd" stroke-width="1.5"/>
  <!-- Leg joint circles -->
  <circle cx="736" cy="316" r="5" fill="#0d2040" stroke="#388bfd" stroke-width="1"/>
  <circle cx="806" cy="316" r="5" fill="#0d2040" stroke="#388bfd" stroke-width="1"/>

  <!-- Feet -->
  <rect x="704" y="402" width="54" height="18" rx="7" fill="#0a1628" stroke="#388bfd" stroke-width="1.5"/>
  <rect x="784" y="402" width="54" height="18" rx="7" fill="#0a1628" stroke="#388bfd" stroke-width="1.5"/>

  <!-- Right robot caption -->
  <text x="771" y="442" font-size="12" fill="#3fb950" text-anchor="middle" font-style="italic">your AI pair programmer, upgraded</text>
  <text x="771" y="458" font-size="10" fill="#1a4a20" text-anchor="middle">remembers · enforces · automates · learns</text>


  <!-- ═══════════════════════════════════════════ -->
  <!-- CALLOUT LABELS                             -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- 1. Brain → MEMORY LAYER -->
  <line x1="801" y1="132" x2="870" y2="132" stroke="#1f3a5e" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="870" cy="132" r="2.5" fill="#388bfd"/>
  <text x="878" y="128" font-size="11" fill="#388bfd" font-weight="bold">MEMORY LAYER</text>
  <text x="878" y="144" font-size="10" fill="#4a7aaa">persists across sessions</text>

  <!-- 2. Right arm → HOOKS -->
  <line x1="868" y1="248" x2="902" y2="195" stroke="#1f3a5e" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="902" cy="195" r="2.5" fill="#388bfd"/>
  <text x="910" y="191" font-size="11" fill="#388bfd" font-weight="bold">HOOKS</text>
  <text x="910" y="207" font-size="10" fill="#4a7aaa">quality gates · auto-format</text>

  <!-- 3. Chest core → RULES -->
  <line x1="836" y1="257" x2="902" y2="265" stroke="#1f3a5e" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="902" cy="265" r="2.5" fill="#388bfd"/>
  <text x="910" y="261" font-size="11" fill="#388bfd" font-weight="bold">RULES</text>
  <text x="910" y="277" font-size="10" fill="#4a7aaa">conventions enforced</text>

  <!-- 4. Legs → COMMANDS -->
  <line x1="824" y1="368" x2="902" y2="348" stroke="#1f3a5e" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="902" cy="348" r="2.5" fill="#388bfd"/>
  <text x="910" y="344" font-size="11" fill="#388bfd" font-weight="bold">COMMANDS</text>
  <text x="910" y="360" font-size="10" fill="#4a7aaa">/tdd · /commit · /plan · /review</text>

</svg>
