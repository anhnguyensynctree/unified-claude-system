<svg width="1200" height="560" viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Fira Mono', monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388bfd"/>
    </marker>
    <marker id="arrow-dim" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3d444d"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="mem-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="560" fill="url(#bg)" rx="12"/>
  <rect width="1200" height="560" fill="none" stroke="#21262d" stroke-width="1" rx="12"/>

  <!-- Header -->
  <text x="600" y="56" font-size="30" fill="#e6edf3" text-anchor="middle" font-weight="bold" letter-spacing="-0.5">unified-claude-system</text>
  <text x="600" y="88" font-size="14" fill="#8b949e" text-anchor="middle">Claude Code · persistent memory · enforced conventions · automated quality gates</text>

  <!-- Divider -->
  <line x1="60" y1="112" x2="1140" y2="112" stroke="#21262d" stroke-width="1"/>

  <!-- ── LEFT: Cold Session ── -->
  <text x="178" y="148" font-size="11" fill="#f85149" text-anchor="middle" font-weight="bold" letter-spacing="1">WITHOUT</text>

  <rect x="60" y="162" width="236" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="178" y="188" font-size="12" fill="#8b949e" text-anchor="middle">Session N</text>
  <line x1="80" y1="196" x2="276" y2="196" stroke="#21262d" stroke-width="1"/>
  <text x="80" y="216" font-size="11" fill="#f85149">✗  starts cold</text>
  <text x="80" y="236" font-size="11" fill="#f85149">✗  re-explain stack</text>
  <text x="80" y="256" font-size="11" fill="#f85149">✗  re-explain conventions</text>
  <text x="80" y="276" font-size="11" fill="#f85149">✗  re-explain preferences</text>

  <!-- Arrow cold → cold -->
  <line x1="178" y1="284" x2="178" y2="318" stroke="#3d444d" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-dim)"/>

  <rect x="60" y="320" width="236" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="178" y="346" font-size="12" fill="#8b949e" text-anchor="middle">Session N+1</text>
  <line x1="80" y1="354" x2="276" y2="354" stroke="#21262d" stroke-width="1"/>
  <text x="80" y="374" font-size="11" fill="#f85149">✗  starts cold again</text>
  <text x="80" y="394" font-size="11" fill="#f85149">✗  nothing persisted</text>
  <text x="80" y="414" font-size="11" fill="#8b949e">↻  repeat forever</text>

  <!-- ── CENTER: Memory Layer ── -->
  <text x="600" y="148" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="bold" letter-spacing="1">MEMORY LAYER</text>

  <!-- Central memory box -->
  <rect x="422" y="162" width="356" height="258" rx="10" fill="url(#mem-grad)" stroke="#388bfd" stroke-width="1.5"/>
  <text x="600" y="190" font-size="13" fill="#388bfd" text-anchor="middle" font-weight="bold">~/.claude/</text>
  <line x1="440" y1="200" x2="760" y2="200" stroke="#21262d" stroke-width="1"/>

  <!-- Memory items -->
  <rect x="440" y="212" width="148" height="50" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="514" y="232" font-size="10" fill="#e6edf3" text-anchor="middle" font-weight="bold">MEMORY.md</text>
  <text x="514" y="252" font-size="10" fill="#8b949e" text-anchor="middle">index · always loaded</text>

  <rect x="596" y="212" width="148" height="50" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="670" y="232" font-size="10" fill="#e6edf3" text-anchor="middle" font-weight="bold">topics/</text>
  <text x="670" y="252" font-size="10" fill="#8b949e" text-anchor="middle">loaded on demand</text>

  <rect x="440" y="272" width="148" height="50" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="514" y="292" font-size="10" fill="#e6edf3" text-anchor="middle" font-weight="bold">facts.json</text>
  <text x="514" y="312" font-size="10" fill="#8b949e" text-anchor="middle">mem0 extraction</text>

  <rect x="596" y="272" width="148" height="50" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="670" y="292" font-size="10" fill="#e6edf3" text-anchor="middle" font-weight="bold">session notes</text>
  <text x="670" y="312" font-size="10" fill="#8b949e" text-anchor="middle">last 7 days</text>

  <!-- Rules + hooks pills -->
  <rect x="440" y="334" width="304" height="36" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="515" y="357" font-size="10" fill="#8b949e" text-anchor="middle">rules/</text>
  <text x="574" y="357" font-size="10" fill="#3d444d">·</text>
  <text x="600" y="357" font-size="10" fill="#8b949e" text-anchor="middle">hooks/</text>
  <text x="659" y="357" font-size="10" fill="#3d444d">·</text>
  <text x="690" y="357" font-size="10" fill="#8b949e" text-anchor="middle">commands/</text>

  <rect x="440" y="380" width="304" height="28" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="600" y="399" font-size="10" fill="#8b949e" text-anchor="middle">Haiku · Sonnet · Opus  —  cost-tiered by task</text>

  <!-- ── RIGHT: Warm Session ── -->
  <text x="1022" y="148" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="bold" letter-spacing="1">WITH THIS SYSTEM</text>

  <rect x="904" y="162" width="236" height="120" rx="8" fill="#161b22" stroke="#238636" stroke-width="1"/>
  <text x="1022" y="188" font-size="12" fill="#8b949e" text-anchor="middle">Session N</text>
  <line x1="924" y1="196" x2="1120" y2="196" stroke="#21262d" stroke-width="1"/>
  <text x="924" y="216" font-size="11" fill="#3fb950">✓  starts warm</text>
  <text x="924" y="236" font-size="11" fill="#3fb950">✓  knows your codebase</text>
  <text x="924" y="256" font-size="11" fill="#3fb950">✓  enforces conventions</text>
  <text x="924" y="276" font-size="11" fill="#3fb950">✓  remembers yesterday</text>

  <!-- Arrow warm → warm -->
  <line x1="1022" y1="284" x2="1022" y2="318" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="904" y="320" width="236" height="100" rx="8" fill="#161b22" stroke="#238636" stroke-width="1"/>
  <text x="1022" y="346" font-size="12" fill="#8b949e" text-anchor="middle">Session N+1</text>
  <line x1="924" y1="354" x2="1120" y2="354" stroke="#21262d" stroke-width="1"/>
  <text x="924" y="374" font-size="11" fill="#3fb950">✓  still warm</text>
  <text x="924" y="394" font-size="11" fill="#3fb950">✓  learned from N</text>
  <text x="924" y="414" font-size="11" fill="#3fb950">✓  patterns accumulate</text>

  <!-- Arrows: left cold → memory -->
  <line x1="298" y1="222" x2="420" y2="290" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="338" y="265" font-size="10" fill="#388bfd" transform="rotate(-22, 338, 265)">injects</text>

  <line x1="298" y1="380" x2="420" y2="330" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="368" font-size="10" fill="#388bfd" transform="rotate(18, 320, 368)">persists</text>

  <!-- Arrows: memory → right warm -->
  <line x1="780" y1="290" x2="902" y2="222" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="828" y="265" font-size="10" fill="#388bfd" transform="rotate(-22, 828, 265)">loads</text>

  <line x1="780" y1="330" x2="902" y2="380" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="820" y="370" font-size="10" fill="#388bfd" transform="rotate(18, 820, 370)">saves</text>

  <!-- ── Bottom status bar mockup ── -->
  <line x1="60" y1="460" x2="1140" y2="460" stroke="#21262d" stroke-width="1"/>
  <text x="600" y="488" font-size="11" fill="#8b949e" text-anchor="middle">Live status line inside Claude Code:</text>

  <rect x="300" y="500" width="600" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="320" y="524" font-size="13" fill="#3fb950">➜</text>
  <text x="344" y="524" font-size="13" fill="#e6edf3">my-project</text>
  <text x="456" y="524" font-size="13" fill="#8b949e">git:(</text>
  <text x="500" y="524" font-size="13" fill="#d2a8ff">feat/auth</text>
  <text x="570" y="524" font-size="13" fill="#8b949e">)</text>
  <text x="590" y="524" font-size="13" fill="#f85149">✗</text>
  <text x="614" y="524" font-size="13" fill="#8b949e">  ctx:</text>
  <text x="660" y="524" font-size="13" fill="#3fb950">34%</text>
  <text x="708" y="524" font-size="13" fill="#8b949e">  claude-sonnet-4-6</text>
</svg>
