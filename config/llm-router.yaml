model_list:
  # Primary: OpenRouter free coding model
  - model_name: qwen-coder
    litellm_params:
      model: openrouter/qwen/qwen3-coder:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  # Fallback: OpenRouter free general model (1M context)
  - model_name: qwen-3.6
    litellm_params:
      model: openrouter/qwen/qwen3.6-plus-preview:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 1
  timeout: 120
  fallbacks:
    - qwen-coder: [qwen-3.6]
    - qwen-3.6: [qwen-coder]

litellm_settings:
  drop_params: true

general_settings:
  master_key: sk-litellm-local-dev
