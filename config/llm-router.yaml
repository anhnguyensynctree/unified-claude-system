    - gemma-3-27b: [llama-3.3-70b, stepfun-3.5]
    - nemotron-3-super: [gpt-oss-120b, llama-3.3-70b]
    - stepfun-3.5: [qwen-3.6-plus, llama-3.3-70b]

litellm_settings:
  drop_params: true

general_settings:
